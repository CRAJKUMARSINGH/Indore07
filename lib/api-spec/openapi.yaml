openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Wuolingo — merged best-of-all Indian language learning platform
servers:
  - url: /api
tags:
  - name: health
  - name: languages
  - name: users
  - name: lessons
  - name: exercises
  - name: leaderboard
  - name: stats

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /languages:
    get:
      operationId: listLanguages
      tags: [languages]
      summary: List all supported Indian languages
      responses:
        "200":
          description: Language list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Language"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update user profile or active language
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /lessons:
    get:
      operationId: listLessons
      tags: [lessons]
      summary: List lessons for a language
      parameters:
        - name: languageId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lessons list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lesson"

  /lessons/{id}:
    get:
      operationId: getLesson
      tags: [lessons]
      summary: Get a lesson with its exercises
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lesson detail with exercises
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonDetail"
        "404":
          description: Not found

  /lessons/{id}/complete:
    post:
      operationId: completeLesson
      tags: [lessons]
      summary: Mark a lesson as complete and award XP
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LessonCompleteInput"
      responses:
        "200":
          description: Completion result with XP awarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonCompleteResult"

  /exercises/{id}/answer:
    post:
      operationId: checkAnswer
      tags: [exercises]
      summary: Submit an answer for an exercise
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerInput"
      responses:
        "200":
          description: Answer result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerResult"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get XP leaderboard with podium
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leaderboard"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get user stats and progress summary
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Language:
      type: object
      required: [id, name, nativeName, code, flag]
      properties:
        id:
          type: string
        name:
          type: string
        nativeName:
          type: string
        code:
          type: string
        flag:
          type: string
        learnerCount:
          type: integer

    User:
      type: object
      required: [id, name, xp, streak, level, currentLanguageId]
      properties:
        id:
          type: integer
        name:
          type: string
        xp:
          type: integer
        streak:
          type: integer
        level:
          type: integer
        currentLanguageId:
          type: string
        weeklyXp:
          type: integer
        longestStreak:
          type: integer
        lessonsCompleted:
          type: integer

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        currentLanguageId:
          type: string
        goals:
          type: array
          items:
            type: string

    Lesson:
      type: object
      required: [id, title, unit, unitTitle, xpReward, status, exerciseCount]
      properties:
        id:
          type: integer
        title:
          type: string
        unit:
          type: integer
        unitTitle:
          type: string
        xpReward:
          type: integer
        status:
          type: string
        exerciseCount:
          type: integer
        languageId:
          type: string

    Exercise:
      type: object
      required: [id, lessonId, type, prompt, options, correctAnswer]
      properties:
        id:
          type: integer
        lessonId:
          type: integer
        type:
          type: string
        prompt:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: string
        audioHint:
          type: ["string", "null"]
        transliteration:
          type: ["string", "null"]

    LessonDetail:
      type: object
      required: [id, title, unit, unitTitle, xpReward, status, exercises]
      properties:
        id:
          type: integer
        title:
          type: string
        unit:
          type: integer
        unitTitle:
          type: string
        xpReward:
          type: integer
        status:
          type: string
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/Exercise"

    LessonCompleteInput:
      type: object
      required: [score]
      properties:
        score:
          type: integer
        timeSpentSeconds:
          type: integer

    LessonCompleteResult:
      type: object
      required: [xpAwarded, newTotal, streakUpdated, newStreak]
      properties:
        xpAwarded:
          type: integer
        newTotal:
          type: integer
        streakUpdated:
          type: boolean
        newStreak:
          type: integer
        levelUp:
          type: boolean

    AnswerInput:
      type: object
      required: [answer]
      properties:
        answer:
          type: string

    AnswerResult:
      type: object
      required: [correct, correctAnswer]
      properties:
        correct:
          type: boolean
        correctAnswer:
          type: string
        xpAwarded:
          type: integer

    LeaderboardEntry:
      type: object
      required: [rank, userId, userName, xp, weeklyXp]
      properties:
        rank:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        xp:
          type: integer
        weeklyXp:
          type: integer
        isCurrentUser:
          type: boolean

    Leaderboard:
      type: object
      required: [entries, currentUserRank]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        currentUserRank:
          type: integer

    Stats:
      type: object
      required: [xp, streak, longestStreak, lessonsCompleted, weeklyXp, level]
      properties:
        xp:
          type: integer
        streak:
          type: integer
        longestStreak:
          type: integer
        lessonsCompleted:
          type: integer
        weeklyXp:
          type: integer
        level:
          type: integer
        languagesStarted:
          type: integer
        dailyGoalXp:
          type: integer
        dailyXp:
          type: integer
